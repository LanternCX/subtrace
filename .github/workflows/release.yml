name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  build:
    needs: test
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package release artifact
        run: |
          mkdir -p dist
          cp "target/aarch64-apple-darwin/release/subroute" dist/subroute
          tar -C dist -czf "subroute-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz" subroute

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aarch64-apple-darwin
          path: subroute-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 \
            && gh release upload "${{ github.ref_name }}" release-artifacts/*.tar.gz --clobber \
            || gh release create "${{ github.ref_name }}" release-artifacts/*.tar.gz --generate-notes
